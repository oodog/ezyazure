name: Infrastructure Deploy

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep
        run: az bicep install

      - name: Lint Bicep
        run: az bicep lint --file infra/main.bicep

      - name: Validate deployment (what-if)
        run: |
          az deployment sub what-if \
            --name easyazure-infra-whatif \
            --location australiaeast \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters environmentName=${{ github.event.inputs.environment || 'staging' }}

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep
        run: az bicep install

      - name: Deploy infrastructure
        run: |
          az deployment sub create \
            --name easyazure-infra-${{ github.run_number }} \
            --location australiaeast \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters environmentName=${{ github.event.inputs.environment || 'staging' }}
